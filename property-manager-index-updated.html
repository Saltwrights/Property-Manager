<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#f6f3ed">
<title>Property Manager</title>
<style>
:root{--ink:#172c34;--muted:#6d7777;--paper:#f6f3ed;--card:#fff;--line:#dcd8cf;--accent:#b96b42;--soft:#e9eee9;--danger:#a94442;--ok:#47745d;--warn:#b4772a;--shadow:0 8px 28px rgba(25,39,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.hidden{display:none!important}button,input,select,textarea{font:inherit}button{cursor:pointer}.shell{max-width:1160px;margin:auto;min-height:100vh}.topbar{position:sticky;top:0;z-index:20;background:rgba(246,243,237,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:15px 18px}.brand{font-family:Georgia,serif;font-size:24px;letter-spacing:-.5px}.brand small{font-family:Inter,sans-serif;display:block;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin-top:2px}.top-actions{display:flex;gap:8px}.icon-btn,.btn{border:0;border-radius:11px;padding:10px 13px;background:var(--ink);color:white;font-weight:700}.btn.secondary,.icon-btn.secondary{background:white;color:var(--ink);border:1px solid var(--line)}.btn.ghost{background:transparent;color:var(--ink)}.btn.danger{background:var(--danger)}.nav{display:flex;gap:4px;padding:10px 14px 0;overflow:auto;position:sticky;top:72px;z-index:15;background:var(--paper)}.nav button{white-space:nowrap;border:0;background:transparent;padding:11px 13px;border-radius:10px;color:var(--muted);font-weight:700}.nav button.active{background:var(--ink);color:white}.content{padding:20px 18px 90px}.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px}.page-head h1{font-family:Georgia,serif;font-weight:500;font-size:34px;margin:0 0 4px}.page-head p{margin:0;color:var(--muted)}.grid{display:grid;gap:14px}.grid.stats{grid-template-columns:repeat(4,1fr)}.grid.two{grid-template-columns:1.15fr .85fr}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.stat b{display:block;font:500 30px Georgia,serif;margin-top:8px}.stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}.card h2{font:500 23px Georgia,serif;margin:0 0 14px}.card h3{margin:0 0 10px;font-size:15px}.quick-form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick-form .wide{grid-column:1/-1}.field label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.45px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:11px;background:#fff;padding:11px 12px;color:var(--ink)}.field textarea{min-height:90px;resize:vertical}.list{display:grid;gap:9px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:13px;border:1px solid var(--line);border-radius:13px;background:#fff}.row-main{min-width:0}.row-title{font-weight:800;overflow:hidden;text-overflow:ellipsis}.row-sub{font-size:13px;color:var(--muted);margin-top:3px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:800;background:var(--soft);color:var(--ink)}.badge.high,.badge.overdue{background:#f7dfdb;color:#8c342f}.badge.medium,.badge.soon{background:#f7ead6;color:#8a5b1d}.badge.low,.badge.current,.badge.closed{background:#dfeee5;color:#366a50}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:13px}.property-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.property-card{overflow:hidden;padding:0}.property-cover{height:145px;background:linear-gradient(135deg,#dfe7e2,#efe5d9);display:flex;align-items:center;justify-content:center;font-size:40px}.property-cover img{width:100%;height:100%;object-fit:cover}.property-body{padding:16px}.property-body h3{font:500 22px Georgia,serif;margin:0 0 5px}.property-meta{color:var(--muted);font-size:13px}.property-actions{display:flex;gap:7px;margin-top:14px}.mini{padding:8px 10px;font-size:12px}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:700px}.table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:10px;border-bottom:1px solid var(--line)}.table td{padding:12px 10px;border-bottom:1px solid var(--line);font-size:14px}.modal-backdrop{position:fixed;inset:0;background:rgba(18,32,37,.55);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:24px 12px;overflow:auto}.modal{width:min(720px,100%);background:var(--paper);border-radius:20px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.25)}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.modal-head h2{font:500 27px Georgia,serif;margin:0}.close{border:0;background:white;border-radius:50%;width:36px;height:36px;font-size:20px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-grid .full{grid-column:1/-1}.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.photo{aspect-ratio:1;border-radius:12px;overflow:hidden;background:#e6e1d8;position:relative}.photo img{width:100%;height:100%;object-fit:cover}.photo button{position:absolute;right:5px;top:5px;border:0;border-radius:50%;width:28px;height:28px;background:rgba(255,255,255,.9)}.auth{min-height:100vh;display:grid;place-items:center;padding:20px}.auth-card{width:min(470px,100%);background:white;border:1px solid var(--line);border-radius:22px;padding:26px;box-shadow:var(--shadow)}.auth-card h1{font:500 38px Georgia,serif;margin:0 0 7px}.auth-card p{color:var(--muted);margin:0 0 20px}.stack{display:grid;gap:12px}.notice{padding:12px;border-radius:11px;background:#eef1ed;color:var(--ink);font-size:13px}.toast{position:fixed;z-index:80;right:18px;bottom:18px;background:var(--ink);color:white;padding:12px 15px;border-radius:12px;box-shadow:var(--shadow)}.section-gap{margin-top:14px}.due-strip{display:flex;gap:8px;overflow:auto;padding-bottom:2px}.due-pill{min-width:190px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff}.due-pill b{display:block;margin-bottom:3px}.file-upload{border:1px dashed var(--line);border-radius:13px;padding:16px;text-align:center}.muted{color:var(--muted)}.money-in{color:var(--ok);font-weight:800}.money-out{color:var(--danger);font-weight:800}.filterbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:14px}.filterbar .field{min-width:170px;flex:1}.note-text{white-space:pre-wrap;margin-top:7px}.summary-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}
.property-detail-hero{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.property-detail-actions{display:flex;gap:8px;flex-wrap:wrap}.timeline{display:grid;gap:9px}.timeline-item{display:grid;grid-template-columns:100px 1fr auto;gap:12px;align-items:start;padding:13px;border:1px solid var(--line);border-radius:13px;background:#fff}.timeline-date{font-size:13px;color:var(--muted)}.timeline-title{font-weight:800}.timeline-detail{font-size:13px;color:var(--muted);margin-top:4px;white-space:pre-wrap}.timeline-amount{font-weight:800;white-space:nowrap}.section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.section-head h2{margin:0}.file-list{display:grid;gap:9px}.clickable{cursor:pointer}.clickable:hover{border-color:var(--ink)}
@media(max-width:850px){.grid.stats{grid-template-columns:1fr 1fr}.grid.two,.property-grid{grid-template-columns:1fr 1fr}.topbar{padding:12px}.nav{top:65px}.content{padding:16px 12px 85px}.page-head h1{font-size:29px}}
@media(max-width:570px){.property-detail-hero{grid-template-columns:1fr}.timeline-item{grid-template-columns:74px 1fr}.timeline-amount{grid-column:2} .grid.two,.property-grid,.quick-form,.form-grid{grid-template-columns:1fr}.quick-form .wide,.form-grid .full{grid-column:auto}.page-head{align-items:center}.page-head p{display:none}.photo-grid{grid-template-columns:1fr 1fr}.top-actions .label{display:none}.grid.stats{gap:9px}.card{padding:14px}.stat b{font-size:25px}.nav{padding-left:8px}.brand{font-size:21px}}
</style>
</head>
<body>
<div id="auth" class="auth">
 <div class="auth-card">
  <h1>Property Manager</h1><p>A calm, simple place for tenants, maintenance, compliance and property records.</p>
  <div id="connectPanel" class="stack">
   <div class="notice">Connect this app to your own Supabase project. Use the browser-safe publishable or anon key only.</div>
   <div class="field"><label>Supabase project URL</label><input id="cfgUrl" placeholder="https://xxxxx.supabase.co"></div>
   <div class="field"><label>Publishable / anon key</label><textarea id="cfgKey" style="min-height:105px"></textarea></div>
   <button class="btn" onclick="saveConnection()">Save connection</button>
  </div>
  <div id="loginPanel" class="stack hidden">
   <div class="field"><label>Email</label><input id="email" type="email"></div>
   <div class="field"><label>Password</label><input id="password" type="password"></div>
   <button class="btn" onclick="login()">Sign in</button>
   <button class="btn secondary" onclick="signup()">Create account</button>
   <button class="btn ghost" onclick="editConnection()">Change Supabase connection</button>
   <div id="authMsg" class="muted"></div>
  </div>
 </div>
</div>
<div id="app" class="shell hidden">
 <header class="topbar"><div class="brand">Property Manager<small>Portfolio manager</small></div><div class="top-actions"><button class="icon-btn secondary" onclick="openModal('issue')">＋ <span class="label">Issue</span></button><button class="icon-btn" onclick="showPage('settings')">⚙</button></div></header>
 <nav class="nav" id="nav"></nav>
 <main class="content" id="content"></main>
</div>
<div id="modalRoot"></div><div id="toast" class="toast hidden"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const PAGES=[['home','Home'],['properties','Properties'],['tenants','Tenants'],['notes','Notes'],['issues','Issues'],['legal','Legal'],['finance','Finance'],['files','Files'],['settings','Settings']];
const emptyState=()=>({properties:[],tenants:[],notes:[],issues:[],legals:[],transactions:[],files:[],settings:{name:'Property Manager',managementFeePercent:10}});
let state=emptyState(),client=null,user=null,page='home',editing=null,saveTimer=null,currentPropertyId='';
const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const uid=()=>crypto.randomUUID(), today=()=>new Date().toISOString().slice(0,10), fmt=d=>d?new Date(d+'T12:00:00').toLocaleDateString('en-GB'):'—';
const prop=id=>state.properties.find(x=>x.id===id), tenant=id=>state.tenants.find(x=>x.id===id);
function cfg(){return {url:localStorage.getItem('property_supabase_url')||'',key:localStorage.getItem('property_supabase_key')||''}}
function editConnection(){$('connectPanel').classList.remove('hidden');$('loginPanel').classList.add('hidden');const c=cfg();$('cfgUrl').value=c.url;$('cfgKey').value=c.key}
async function saveConnection(){const url=$('cfgUrl').value.trim(),key=$('cfgKey').value.trim();if(!url||!key)return toast('Add both Supabase details',true);localStorage.setItem('property_supabase_url',url);localStorage.setItem('property_supabase_key',key);await init()}
async function init(){const c=cfg();if(!c.url||!c.key){editConnection();return}try{client=window.supabase.createClient(c.url,c.key);$('connectPanel').classList.add('hidden');$('loginPanel').classList.remove('hidden');const {data:{session}}=await client.auth.getSession();client.auth.onAuthStateChange((_e,s)=>{if(s?.user&&!user)enter(s.user);if(!s)leave()});if(session?.user)await enter(session.user)}catch(e){editConnection();toast(e.message,true)}}
async function login(){msg('Signing in…');const {data,error}=await client.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(error)msg(error.message,true);else await enter(data.user)}
async function signup(){msg('Creating account…');const {data,error}=await client.auth.signUp({email:$('email').value.trim(),password:$('password').value});if(error)msg(error.message,true);else if(data.session)await enter(data.user);else msg('Account created. Check your email to confirm it, then sign in.')}
function msg(t,e=false){$('authMsg').textContent=t;$('authMsg').style.color=e?'#a94442':''}
async function enter(u){user=u;const {data,error}=await client.from('property_app_state').select('data').eq('user_id',u.id).maybeSingle();if(error){msg(error.message,true);return}if(data?.data){state={...emptyState(),...data.data};state.settings={...emptyState().settings,...(data.data.settings||{})};}else await client.from('property_app_state').insert({user_id:u.id,data:state});$('auth').classList.add('hidden');$('app').classList.remove('hidden');renderNav();showPage('home')}
function leave(){user=null;$('app').classList.add('hidden');$('auth').classList.remove('hidden');$('loginPanel').classList.remove('hidden')}
async function save(){if(!client||!user)return;clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{const {error}=await client.from('property_app_state').upsert({user_id:user.id,data:state,updated_at:new Date().toISOString()},{onConflict:'user_id'});if(error)toast(error.message,true)},250)}
function renderNav(){ $('nav').innerHTML=PAGES.map(([k,l])=>`<button data-page="${k}" onclick="showPage('${k}')">${l}</button>`).join('') }
function showPage(p){page=p;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===p));({home:renderHome,properties:renderProperties,property:renderPropertyDetail,tenants:renderTenants,notes:renderNotes,issues:renderIssues,legal:renderLegal,finance:renderFinance,files:renderFiles,settings:renderSettings}[p]||renderHome)()}
function head(title,sub,action=''){return `<div class="page-head"><div><h1>${title}</h1><p>${sub}</p></div>${action}</div>`}
function legalStatus(x){if(!x.expiry)return ['No date','medium'];const days=Math.ceil((new Date(x.expiry)-new Date(today()))/86400000);return days<0?['Overdue','overdue']:days<=30?['Due soon','soon']:['Current','current']}
function money(n){return '£'+(+n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}
function monthNow(){return today().slice(0,7)}
function monthLabel(m){return new Date(m+'-01T12:00:00').toLocaleDateString('en-GB',{month:'long',year:'numeric'})}
function txForMonth(m,propertyId=''){return state.transactions.filter(x=>(x.date||'').slice(0,7)===m&&(!propertyId||x.propertyId===propertyId)).sort((a,b)=>(a.date||'').localeCompare(b.date||''))}
function renderHome(){const open=state.issues.filter(x=>x.status!=='Closed').length,monthly=state.properties.reduce((a,p)=>a+(+p.rent||0),0),due=state.legals.map(x=>({...x,st:legalStatus(x)})).filter(x=>x.st[1]!=='current').sort((a,b)=>(a.expiry||'9999').localeCompare(b.expiry||'9999'));
 $('content').innerHTML=head('Good morning','Everything important across your properties, at a glance.')+`<div class="grid stats"><div class="card stat"><span>Properties</span><b>${state.properties.length}</b></div><div class="card stat"><span>Current tenants</span><b>${state.tenants.filter(t=>!t.end||t.end>=today()).length}</b></div><div class="card stat"><span>Open issues</span><b>${open}</b></div><div class="card stat"><span>Monthly rent</span><b>£${monthly.toLocaleString()}</b></div></div>
 <div class="grid two section-gap"><section class="card"><h2>Log an issue quickly</h2>${quickIssueForm()}</section><section class="card"><h2>Legal checks needing attention</h2>${due.length?`<div class="list">${due.slice(0,5).map(x=>row(`${esc(x.type)} — ${esc(prop(x.propertyId)?.name||'Property')}`,`${x.expiry?'Due '+fmt(x.expiry):'No renewal date'}`,`<span class="badge ${x.st[1]}">${x.st[0]}</span>`)).join('')}</div>`:'<div class="empty">Nothing is due soon.</div>'}</section></div>
 <div class="grid two section-gap"><section class="card"><h2>Recent issues</h2>${state.issues.length?`<div class="list">${[...state.issues].sort((a,b)=>b.created.localeCompare(a.created)).slice(0,6).map(issueRow).join('')}</div>`:'<div class="empty">No maintenance issues logged.</div>'}</section><section class="card"><h2>Your properties</h2>${state.properties.length?`<div class="list">${state.properties.slice(0,6).map(p=>row(esc(p.name),esc(p.address||''),`<span class="badge">£${(+p.rent||0).toLocaleString()}/mo</span>`)).join('')}</div>`:'<div class="empty">Add your first property to begin.</div>'}</section></div>`}
function quickIssueForm(){return `<div class="quick-form"><div class="field"><label>Property</label><select id="qProperty">${propertyOptions()}</select></div><div class="field"><label>Priority</label><select id="qPriority"><option>Medium</option><option>Low</option><option>High</option></select></div><div class="field wide"><label>What is the issue?</label><input id="qTitle" placeholder="e.g. Boiler losing pressure"></div><div class="field wide"><label>Notes</label><textarea id="qNotes" placeholder="Add any useful detail"></textarea></div><div class="wide"><button class="btn" onclick="quickIssue()">Log issue</button></div></div>`}
function quickIssue(){if(!state.properties.length)return toast('Add a property first',true);const title=$('qTitle').value.trim();if(!title)return toast('Add a short issue title',true);state.issues.push({id:uid(),propertyId:$('qProperty').value,title,notes:$('qNotes').value.trim(),priority:$('qPriority').value,status:'Open',created:today(),cost:'',contractor:'',tenantId:''});save();toast('Issue logged');renderHome()}
function row(title,sub,right=''){return `<div class="row"><div class="row-main"><div class="row-title">${title}</div><div class="row-sub">${sub}</div></div>${right}</div>`}
function propertyOptions(selected=''){return state.properties.map(p=>`<option value="${p.id}" ${p.id===selected?'selected':''}>${esc(p.name)}</option>`).join('')}
function tenantOptions(selected=''){return `<option value="">None</option>`+state.tenants.map(t=>`<option value="${t.id}" ${t.id===selected?'selected':''}>${esc(t.name)}</option>`).join('')}
function options(values,selected){return values.map(v=>`<option ${v===selected?'selected':''}>${v}</option>`).join('')}
function cover(p){const f=state.files.find(x=>x.propertyId===p.id&&x.kind==='photo');return f?`<img src="${esc(f.thumb||'')}" data-file="${f.id}">`:'⌂'}
function openProperty(id){currentPropertyId=id;showPage('property')}
function renderProperties(){$('content').innerHTML=head('Properties','Open a property to see its complete history, finances, notes and files.',`<button class="btn" onclick="openModal('property')">＋ Add property</button>`)+(state.properties.length?`<div class="property-grid">${state.properties.map(p=>`<article class="card property-card clickable" onclick="openProperty('${p.id}')"><div class="property-cover">${cover(p)}</div><div class="property-body"><h3>${esc(p.name)}</h3><div class="property-meta">${esc(p.address||'No address entered')}</div><div class="property-meta" style="margin-top:7px">${p.bedrooms||'—'} beds · £${(+p.rent||0).toLocaleString()}/month</div><div class="property-actions"><button class="btn mini" onclick="event.stopPropagation();openProperty('${p.id}')">Open property</button><button class="btn secondary mini" onclick="event.stopPropagation();openModal('note',null,'${p.id}')">Add note</button><button class="btn secondary mini" onclick="event.stopPropagation();openModal('transaction',null,'${p.id}')">Add expense</button></div></div></article>`).join('')}</div>`:'<div class="empty">No properties yet. Add the first house or flat.</div>');hydrateImages()}

function propertyTaxYearTotals(propertyId){const tx=txForTaxYear(currentTaxYearStart(),propertyId);return {income:tx.filter(x=>x.direction==='Income').reduce((a,x)=>a+(+x.amount||0),0),expenses:tx.filter(x=>x.direction==='Expense').reduce((a,x)=>a+(+x.amount||0),0),fees:tx.filter(x=>x.direction==='Expense'&&x.category==='Management fee').reduce((a,x)=>a+(+x.amount||0),0),entries:tx.length}}
function propertyTimeline(propertyId){const items=[];state.transactions.filter(x=>x.propertyId===propertyId).forEach(x=>items.push({date:x.date||'',kind:'transaction',id:x.id,title:x.description||x.category,detail:`${x.category}${x.party?' · '+x.party:''}${x.notes?'\n'+x.notes:''}`,amount:(x.direction==='Income'?'+':'−')+money(x.amount),direction:x.direction,attachmentCount:transactionFiles(x.id).length}));state.notes.filter(x=>x.propertyId===propertyId).forEach(x=>items.push({date:x.date||'',kind:'note',id:x.id,title:x.title||'Property note',detail:`${x.contact?x.contact+' · ':''}${x.details||''}`}));state.issues.filter(x=>x.propertyId===propertyId).forEach(x=>items.push({date:x.created||'',kind:'issue',id:x.id,title:x.title,detail:`${x.status||'Open'} · ${x.priority||'Medium'}${x.notes?'\n'+x.notes:''}`,amount:x.cost?`−${money(x.cost)}`:''}));state.legals.filter(x=>x.propertyId===propertyId).forEach(x=>items.push({date:x.completed||x.expiry||'',kind:'legal',id:x.id,title:x.type,detail:`Completed ${fmt(x.completed)} · Renewal ${fmt(x.expiry)}${x.provider?' · '+x.provider:''}`}));return items.sort((a,b)=>(b.date||'').localeCompare(a.date||''))}
function timelineAction(x){if(x.kind==='transaction')return `openModal('transaction','${x.id}')`;if(x.kind==='note')return `openModal('note','${x.id}')`;if(x.kind==='issue')return `openModal('issue','${x.id}')`;return `openModal('legal','${x.id}')`}

function downloadTaxYearHTML(y,propertyId=''){const tx=txForTaxYear(y,propertyId),income=tx.filter(x=>x.direction==='Income').reduce((a,x)=>a+(+x.amount||0),0),expenses=tx.filter(x=>x.direction==='Expense').reduce((a,x)=>a+(+x.amount||0),0),name=propertyId?prop(propertyId)?.name:'All properties',r=taxYearRange(+y),html=statementHTML('Property tax-year statement',`${taxYearLabel(+y)} · ${fmt(r.start)} to ${fmt(r.end)}`,name,tx,income,expenses,true);downloadBlob(html,`property-tax-year-${taxYearLabel(+y).replace('/','-')}.html`,'text/html')}
function statementHTML(title,period,name,tx,income,expenses,showSummary=false){const propRows=showSummary?propertySummaryRows(tx):[],catRows=showSummary?categorySummaryRows(tx):[];return `<!doctype html><meta charset="utf-8"><title>${esc(title)} ${esc(period)}</title><style>body{font-family:Arial,sans-serif;max-width:1000px;margin:40px auto;color:#172c34}h1,h2{font-family:Georgia,serif}table{width:100%;border-collapse:collapse;margin-top:22px}th,td{padding:9px;border-bottom:1px solid #ddd;text-align:left}.num{text-align:right}.totals{margin:25px 0 0 auto;width:330px;font-size:17px}.totals div{display:flex;justify-content:space-between;padding:7px}.muted{color:#687}@media print{body{margin:15mm}.no-print{display:none}}</style><h1>${esc(title)}</h1><p><b>Period:</b> ${esc(period)}<br><b>Property:</b> ${esc(name||'All properties')}</p><table><thead><tr><th>Date</th><th>Property</th><th>Type</th><th>Category</th><th>Description</th><th class="num">Amount</th></tr></thead><tbody>${tx.map(x=>`<tr><td>${fmt(x.date)}</td><td>${esc(prop(x.propertyId)?.name||'')}</td><td>${esc(x.direction)}</td><td>${esc(x.category)}</td><td>${esc(x.description||'')}</td><td class="num">${x.direction==='Income'?'+':'−'}${money(x.amount)}</td></tr>`).join('')||'<tr><td colspan="6">No transactions in this period.</td></tr>'}</tbody></table><div class="totals"><div><b>Income</b><span>${money(income)}</span></div><div><b>Expenses</b><span>${money(expenses)}</span></div><div><b>Net</b><span>${money(income-expenses)}</span></div></div>${showSummary?`<h2>Summary by property</h2><table><thead><tr><th>Property</th><th class="num">Income</th><th class="num">Expenses</th><th class="num">Net</th></tr></thead><tbody>${propRows.map(r=>`<tr><td>${esc(r[0])}</td><td class="num">${money(r[1])}</td><td class="num">${money(r[2])}</td><td class="num">${money(r[3])}</td></tr>`).join('')}</tbody></table><h2>Summary by category</h2><table><thead><tr><th>Category</th><th class="num">Total</th></tr></thead><tbody>${catRows.map(r=>`<tr><td>${esc(r[0])}</td><td class="num">${money(r[1])}</td></tr>`).join('')}</tbody></table>`:''}<p class="muted">Generated ${new Date().toLocaleDateString('en-GB')}</p>`}
function downloadBlob(content,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function renderFiles(){$('content').innerHTML=head('Photos & files','Property photographs, certificates, inventories and documents.',`<button class="btn" onclick="openModal('file')">＋ Upload</button>`)+(state.files.length?`<div class="photo-grid">${state.files.map(f=>`<div class="photo">${f.kind==='photo'?`<img src="${esc(f.thumb||'')}" data-file="${f.id}">`:`<div style="padding:18px;text-align:center">📄<br><small>${esc(f.name)}</small></div>`}<button onclick="deleteFile('${f.id}')">×</button></div>`).join('')}</div>`:'<div class="empty">No photos or documents uploaded.</div>');hydrateImages()}
function renderSettings(){const c=cfg(),fee=+(state.settings.managementFeePercent??10);$('content').innerHTML=head('Settings','Connection, automatic fees, backups and account.')+`<div class="grid two"><section class="card"><h2>Management fee</h2><p class="muted">A fee is created automatically whenever you save a transaction as Rent received. No VAT is added.</p><div class="field"><label>Management fee percentage</label><input id="managementFeePercent" type="number" min="0" step="0.1" value="${fee}"></div><button class="btn section-gap" onclick="saveManagementFeeSetting()">Save fee setting</button></section><section class="card"><h2>Supabase connection</h2><div class="field"><label>Project URL</label><input value="${esc(c.url)}" disabled></div><p class="muted">Your publishable key is stored only in this browser. Data access is protected by your login and Row Level Security.</p><button class="btn secondary" onclick="editConnection();leave()">Change connection</button></section></div><div class="grid two section-gap"><section class="card"><h2>Backup</h2><p class="muted">Export a complete JSON copy of the written records. Uploaded files remain in Supabase Storage.</p><button class="btn secondary" onclick="exportData()">Export backup</button><label class="btn secondary" style="display:inline-block">Import backup<input type="file" accept="application/json" hidden onchange="importData(this.files[0])"></label></section><section class="card"><h2>Account</h2><p>${esc(user?.email||'')}</p><button class="btn danger" onclick="client.auth.signOut()">Sign out</button></section></div>`}
function saveManagementFeeSetting(){const n=parseFloat($('managementFeePercent').value);if(!Number.isFinite(n)||n<0)return toast('Enter a valid percentage',true);state.settings.managementFeePercent=n;save();toast('Management fee saved')}
function syncManagementFee(rent,previous){const oldLinkedId=previous?.linkedFeeId;const existing=oldLinkedId?state.transactions.find(x=>x.id===oldLinkedId):state.transactions.find(x=>x.linkedRentId===rent.id);const isRent=rent.direction==='Income'&&rent.category==='Rent received';if(!isRent){if(existing)state.transactions=state.transactions.filter(x=>x.id!==existing.id);delete rent.linkedFeeId;return}const pct=+(state.settings.managementFeePercent??10),amount=+(rent.amount||0);if(!amount||pct<=0){if(existing)state.transactions=state.transactions.filter(x=>x.id!==existing.id);delete rent.linkedFeeId;return}const fee={id:existing?.id||uid(),propertyId:rent.propertyId,date:rent.date,direction:'Expense',category:'Management fee',amount:(amount*pct/100).toFixed(2),party:'Property management',description:`Automatic ${pct}% management fee on rent received`,notes:'No VAT',autoGenerated:true,linkedRentId:rent.id};rent.linkedFeeId=fee.id;const i=state.transactions.findIndex(x=>x.id===fee.id);i>=0?state.transactions[i]=fee:state.transactions.push(fee)}
function field(id,label,value='',type='text',full=false,opts=''){let control='';if(type==='textarea')control=`<textarea id="${id}">${esc(value)}</textarea>`;else if(type==='select')control=`<select id="${id}">${opts}</select>`;else control=`<input id="${id}" type="${type}" value="${esc(value)}">`;return `<div class="field ${full?'full':''}"><label>${label}</label>${control}</div>`}
function openModal(type,id=null,presetProperty=''){editing={type,id};let x={};if(id){const list={property:'properties',tenant:'tenants',note:'notes',issue:'issues',legal:'legals',transaction:'transactions'}[type];x=state[list].find(v=>v.id===id)||{}};let title='',body='';
 if(type==='property'){title=id?'Edit property':'Add property';body=field('fName','Property name',x.name)+field('fAddress','Full address',x.address,'textarea',true)+field('fBeds','Bedrooms',x.bedrooms,'number')+field('fRent','Monthly rent (£)',x.rent,'number')+field('fMortgage','Mortgage / monthly cost (£)',x.mortgage,'number')+field('fInsurance','Insurance provider',x.insurance)+field('fPolicy','Policy number',x.policy)+field('fNotes','Notes',x.notes,'textarea',true)}
 if(type==='tenant'){title=id?'Edit tenant':'Add tenant';body=field('fName','Tenant name',x.name)+field('fProperty','Property',x.propertyId,'select',false,propertyOptions(x.propertyId))+field('fEmail','Email',x.email,'email')+field('fPhone','Phone',x.phone,'tel')+field('fStart','Tenancy start',x.start,'date')+field('fEnd','Tenancy end',x.end,'date')+field('fRent','Monthly rent (£)',x.rent,'number')+field('fDeposit','Deposit (£)',x.deposit,'number')+field('fDepositScheme','Deposit scheme / reference',x.depositScheme)+field('fEmergency','Emergency contact',x.emergency)+field('fNotes','Notes',x.notes,'textarea',true)}
 if(type==='issue'){title=id?'Edit issue':'Log issue';body=field('fProperty','Property',x.propertyId||presetProperty,'select',false,propertyOptions(x.propertyId||presetProperty))+field('fTenant','Reported by / tenant',x.tenantId,'select',false,tenantOptions(x.tenantId))+field('fTitle','Issue title',x.title)+field('fPriority','Priority',x.priority||'Medium','select',false,options(['Low','Medium','High'],x.priority||'Medium'))+field('fStatus','Status',x.status||'Open','select',false,options(['Open','In progress','Waiting','Closed'],x.status||'Open'))+field('fCreated','Reported date',x.created||today(),'date')+field('fContractor','Contractor',x.contractor)+field('fCost','Cost (£)',x.cost,'number')+field('fNotes','Details',x.notes,'textarea',true)}
 if(type==='legal'){title=id?'Edit legal record':'Add legal record';const types=['Gas Safety','EICR','EPC','Buildings Insurance','Landlord Insurance','Smoke Alarm Check','CO Alarm Check','Legionella Assessment','PAT Testing','Other'];body=field('fProperty','Property',x.propertyId,'select',false,propertyOptions(x.propertyId))+field('fType','Record type',x.type||types[0],'select',false,options(types,x.type||types[0]))+field('fCompleted','Last completed',x.completed,'date')+field('fExpiry','Renewal / expiry date',x.expiry,'date')+field('fProvider','Engineer / provider',x.provider)+field('fReference','Certificate / policy reference',x.reference)+field('fNotes','Notes',x.notes,'textarea',true)}
 if(type==='note'){title=id?'Edit property note':'Add property note';body=field('fProperty','Property',x.propertyId||presetProperty,'select',false,propertyOptions(x.propertyId||presetProperty))+field('fDate','Date',x.date||today(),'date')+field('fTitle','Short heading',x.title)+field('fContact','Person / company',x.contact)+field('fDetails','What happened?',x.details,'textarea',true)}
 if(type==='transaction'){title=id?'Edit transaction':'Add transaction';const cats=['Rent received','Rent paid','Mortgage','Repairs & maintenance','Insurance','Service charge','Utilities','Council tax','Management fee','Legal & professional','Other'];body=field('fProperty','Property',x.propertyId||presetProperty,'select',false,propertyOptions(x.propertyId||presetProperty))+field('fDate','Date',x.date||today(),'date')+field('fDirection','Money in or out?',x.direction||'Income','select',false,options(['Income','Expense'],x.direction||'Income'))+field('fCategory','Category',x.category||cats[0],'select',false,options(cats,x.category||cats[0]))+field('fAmount','Amount (£)',x.amount,'number')+field('fDescription','Description / reference',x.description,'textarea',true)}
 if(type==='activity'){title=id?'Edit property note':'Add property note';body=field('fProperty','Property',x.propertyId||presetProperty,'select',false,propertyOptions(x.propertyId||presetProperty))+field('fDate','Date',x.date||today(),'date')+field('fCategory','Type',x.category||'Email','select',false,options(['Email','Phone call','Visit','Letter','Contractor','General note'],x.category||'Email'))+field('fContact','Person / company',x.contact)+field('fNote','What happened?',x.note,'textarea',true)}
 if(type==='transaction'){title=id?'Edit transaction':'Add transaction';const attached=id?transactionFiles(id):[];body=field('fProperty','Property',x.propertyId||presetProperty,'select',false,propertyOptions(x.propertyId||presetProperty))+field('fDate','Date',x.date||today(),'date')+field('fDirection','Money',x.direction||'Income','select',false,options(['Income','Expense'],x.direction||'Income'))+field('fCategory','Category',x.category||'Rent received','select',false,options(['Rent received','Rent paid','Mortgage','Insurance','Repairs','Maintenance','Safety certificate','Management fee','Council tax','Utilities','Deposit','Other'],x.category||'Rent received'))+field('fAmount','Amount (£)',x.amount,'number')+field('fParty','Paid by / paid to',x.party)+field('fDescription','Description',x.description)+field('fNotes','Notes',x.notes,'textarea',true)+`<div class="field full"><label>Invoice or receipt</label><div class="file-upload"><input id="fInvoice" type="file" accept="image/*,.pdf,.doc,.docx" multiple><div class="muted" style="margin-top:7px">Attach one or more invoices, receipts or photographs.</div></div>${attached.length?`<div class="list section-gap">${attached.map(f=>`<div class="row"><div class="row-main"><div class="row-title">📎 ${esc(f.name)}</div></div><div><button type="button" class="btn secondary mini" onclick="openStoredFile('${f.id}')">Open</button> <button type="button" class="btn danger mini" onclick="deleteTransactionFile('${f.id}')">Delete</button></div></div>`).join('')}</div>`:''}</div>`}
 if(type==='file'){title='Upload photo or document';body=field('fProperty','Property',presetProperty,'select',false,propertyOptions(presetProperty))+`<div class="field full"><label>File</label><div class="file-upload"><input id="fFile" type="file" accept="image/*,.pdf,.doc,.docx"></div></div>`}
 $('modalRoot').innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-head"><h2>${title}</h2><button class="close" onclick="closeModal()">×</button></div><div class="form-grid">${body}</div><div class="modal-foot">${id&&type!=='file'?`<button class="btn danger" onclick="deleteEditing()">Delete</button>`:''}<button class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveModal()">Save</button></div></div></div>`}
function val(id){return $(id)?.value?.trim?.()??''}
async function saveModal(){const {type,id}=editing;if(type!=='property'&&!state.properties.length)return toast('Add a property first',true);let obj={id:id||uid()};
 if(type==='property')obj={...obj,name:val('fName'),address:val('fAddress'),bedrooms:val('fBeds'),rent:val('fRent'),mortgage:val('fMortgage'),insurance:val('fInsurance'),policy:val('fPolicy'),notes:val('fNotes')};
 if(type==='tenant')obj={...obj,name:val('fName'),propertyId:val('fProperty'),email:val('fEmail'),phone:val('fPhone'),start:val('fStart'),end:val('fEnd'),rent:val('fRent'),deposit:val('fDeposit'),depositScheme:val('fDepositScheme'),emergency:val('fEmergency'),notes:val('fNotes')};
 if(type==='issue')obj={...obj,propertyId:val('fProperty'),tenantId:val('fTenant'),title:val('fTitle'),priority:val('fPriority'),status:val('fStatus'),created:val('fCreated'),contractor:val('fContractor'),cost:val('fCost'),notes:val('fNotes')};
 if(type==='legal')obj={...obj,propertyId:val('fProperty'),type:val('fType'),completed:val('fCompleted'),expiry:val('fExpiry'),provider:val('fProvider'),reference:val('fReference'),notes:val('fNotes')};
 if(type==='activity')obj={...obj,propertyId:val('fProperty'),date:val('fDate'),category:val('fCategory'),contact:val('fContact'),note:val('fNote')};
 if(type==='transaction')obj={...obj,propertyId:val('fProperty'),date:val('fDate'),direction:val('fDirection'),category:val('fCategory'),amount:val('fAmount'),party:val('fParty'),description:val('fDescription'),notes:val('fNotes')};
 if(type==='note')obj={...obj,propertyId:val('fProperty'),date:val('fDate'),title:val('fTitle'),contact:val('fContact'),details:val('fDetails'),createdAt:new Date().toISOString()};

 if(type==='file')return uploadFile();
 if(type==='property'&&!obj.name)return toast('Add the property name',true);if(type==='tenant'&&!obj.name)return toast('Add the tenant name',true);if(type==='issue'&&!obj.title)return toast('Add the issue title',true);if(type==='legal'&&!obj.type)return toast('Choose a record type',true);if(type==='note'&&!obj.title&&!obj.details)return toast('Add a note',true);if(type==='transaction'&&(!obj.date||!obj.amount))return toast('Add the date and amount',true);const key={property:'properties',tenant:'tenants',note:'notes',issue:'issues',legal:'legals',transaction:'transactions'}[type],i=state[key].findIndex(x=>x.id===id),previous=i>=0?state[key][i]:null;i>=0?state[key][i]=obj:state[key].push(obj);if(type==='transaction'&&!obj.autoGenerated)syncManagementFee(obj,previous);if(type==='transaction'){const invoiceFiles=Array.from($('fInvoice')?.files||[]);if(invoiceFiles.length){toast('Uploading invoice…');const ok=await uploadTransactionFiles(invoiceFiles,obj);if(!ok)return}}save();closeModal();showPage(page);toast(type==='transaction'&&obj.category==='Rent received'?'Rent and management fee saved':'Saved')}
function transactionFiles(transactionId){return state.files.filter(f=>f.transactionId===transactionId)}
async function openStoredFile(fileId){const f=state.files.find(x=>x.id===fileId);if(!f)return toast('File not found',true);const {data,error}=await client.storage.from('property-files').createSignedUrl(f.path,300);if(error||!data?.signedUrl)return toast(error?.message||'Could not open file',true);window.open(data.signedUrl,'_blank','noopener')}
function openTransactionFiles(transactionId){const files=transactionFiles(transactionId);if(files.length===1)return openStoredFile(files[0].id);const body=files.map(f=>`<div class="row"><div class="row-main"><div class="row-title">📎 ${esc(f.name)}</div></div><button class="btn secondary mini" onclick="openStoredFile('${f.id}')">Open</button></div>`).join('');$('modalRoot').innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-head"><h2>Invoices & receipts</h2><button class="close" onclick="closeModal()">×</button></div><div class="list">${body}</div></div></div>`}
async function uploadTransactionFiles(files,transaction){for(const file of files){const clean=file.name.replace(/[^a-zA-Z0-9._-]/g,'-'),path=`${user.id}/${transaction.propertyId}/invoices/${transaction.id}/${Date.now()}-${uid()}-${clean}`;const {error}=await client.storage.from('property-files').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:false});if(error){toast(error.message,true);return false}state.files.push({id:uid(),propertyId:transaction.propertyId,transactionId:transaction.id,path,name:file.name,kind:file.type.startsWith('image/')?'photo':'document',created:today(),thumb:''})}return true}
async function deleteTransactionFile(fileId){const f=state.files.find(x=>x.id===fileId);if(!f||!confirm('Delete this invoice or receipt?'))return;const {error}=await client.storage.from('property-files').remove([f.path]);if(error)return toast(error.message,true);state.files=state.files.filter(x=>x.id!==fileId);await save();closeModal();openModal('transaction',editing?.id||f.transactionId);toast('Attachment deleted')}
async function uploadFile(){const file=$('fFile').files[0],propertyId=val('fProperty');if(!file)return toast('Choose a file',true);const clean=file.name.replace(/[^a-zA-Z0-9._-]/g,'-'),path=`${user.id}/${propertyId}/${Date.now()}-${clean}`;toast('Uploading…');const {error}=await client.storage.from('property-files').upload(path,file,{contentType:file.type,upsert:false});if(error)return toast(error.message,true);state.files.push({id:uid(),propertyId,path,name:file.name,kind:file.type.startsWith('image/')?'photo':'document',created:today(),thumb:''});save();closeModal();showPage('files');toast('Uploaded')}
async function deleteFile(id){const f=state.files.find(x=>x.id===id);if(!f||!confirm('Delete this file?'))return;await client.storage.from('property-files').remove([f.path]);state.files=state.files.filter(x=>x.id!==id);save();renderFiles()}
function deleteEditing(){const key={property:'properties',tenant:'tenants',note:'notes',issue:'issues',legal:'legals',transaction:'transactions'}[editing.type];removeItem(key,editing.id,true)}
function removeItem(key,id,fromModal=false){if(!confirm('Delete this record?'))return;if(key==='transactions'){const tx=state.transactions.find(x=>x.id===id);const attached=transactionFiles(id);if(attached.length){client.storage.from('property-files').remove(attached.map(f=>f.path));state.files=state.files.filter(f=>f.transactionId!==id)}if(tx?.linkedFeeId)state.transactions=state.transactions.filter(x=>x.id!==tx.linkedFeeId);if(tx?.linkedRentId){const rent=state.transactions.find(x=>x.id===tx.linkedRentId);if(rent)delete rent.linkedFeeId}}state[key]=state[key].filter(x=>x.id!==id);if(key==='properties'){state.tenants=state.tenants.filter(x=>x.propertyId!==id);state.issues=state.issues.filter(x=>x.propertyId!==id);state.legals=state.legals.filter(x=>x.propertyId!==id);state.notes=state.notes.filter(x=>x.propertyId!==id);state.transactions=state.transactions.filter(x=>x.propertyId!==id)}save();if(fromModal)closeModal();showPage(page)}
function closeModal(){$('modalRoot').innerHTML='';editing=null}
function toast(t,e=false){const el=$('toast');el.textContent=t;el.style.background=e?'#a94442':'';el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),2600)}
function exportData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download=`property-backup-${today()}.json`;a.click();URL.revokeObjectURL(a.href)}
async function importData(file){if(!file)return;try{const data=JSON.parse(await file.text());if(!confirm('Replace the current written records with this backup?'))return;state={...emptyState(),...data};save();toast('Backup imported');showPage('home')}catch(e){toast('That backup could not be read',true)}}
init();
</script>
